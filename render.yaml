databases:
  - name: karigar-interio-db
    databaseName: karigarinterio_db
    user: karigarinterio_user

services:
  - type: web
    name: karigar-interio-backend
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: sh build.sh
    startCommand: sh start.sh
    autoDeploy: false
    disk:
      name: karigar-interio-media
      mountPath: /opt/render/project/src/backend/media
      sizeGB: 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.2
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: karigar-interio-db
          property: connectionString
      - key: DB_SSL_REQUIRE
        value: true
      - key: STATIC_ROOT
        value: /opt/render/project/src/backend/staticfiles
      - key: MEDIA_ROOT
        value: /opt/render/project/src/backend/media
      - key: MEDIA_URL
        value: /media/
      - key: SERVE_MEDIA
        value: true
      - key: USE_X_FORWARDED_HOST
        value: true
      - key: SECURE_SSL_REDIRECT
        value: true
      - key: SESSION_COOKIE_SECURE
        value: true
      - key: CSRF_COOKIE_SECURE
        value: true
      - key: SECURE_HSTS_SECONDS
        value: 31536000
      - key: SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: true
      - key: SECURE_HSTS_PRELOAD
        value: true
      - key: OTP_SEND_THROTTLE
        value: 5/hour
      - key: OTP_VERIFY_THROTTLE
        value: 10/hour
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: no-reply@karigarinterio.com
      - key: ADMIN_NOTIFICATION_EMAILS
        sync: false
      - key: EMAIL_BACKEND
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_USE_TLS
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_CURRENCY
        value: INR
